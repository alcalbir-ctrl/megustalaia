<!DOCTYPE html>
<html>
<head>
<title>Mini Geometry Dash</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Mini Geometry Dash</h1>

<div id="menu">
<button onclick="startGame()">Jugar</button>
<button onclick="openShop()">Tienda</button>
<p>Monedas: <span id="coins">0</span></p>
</div>

<div id="shop" style="display:none;">
<h2>Tienda</h2>
<button onclick="buyColor('blue',5)">Azul (5)</button>
<button onclick="buyColor('green',10)">Verde (10)</button>
<button onclick="buyColor('purple',15)">Morado (15)</button>
<br><br>
<button onclick="closeShop()">Volver</button>
</div>

<div id="game">
<div id="player"></div>
<div id="obstacle"></div>
</div>

<script src="game.js"></script>

</body>
</html>
